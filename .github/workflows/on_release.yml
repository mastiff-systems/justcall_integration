name: Generate Semantic Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Entire Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true   # important for private org repos

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup dependencies
        run: |
          npm install @semantic-release/git @semantic-release/exec --no-save

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # built-in token with proper permissions
          GIT_AUTHOR_NAME: "PR Bot"
          GIT_AUTHOR_EMAIL: "despiritu@mastiffsystems.com"
          GIT_COMMITTER_NAME: "PR Bot"
          GIT_COMMITTER_EMAIL: "despiritu@mastiffsystems.com"
        run: npx semantic-release
